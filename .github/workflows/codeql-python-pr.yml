name: CodeQL Python Scan

on:
  pull_request:
    branches: [ "main" ]  # Scan PRs targeting main branch

permissions:
  contents: read
  security-events: write   # Required to upload results to Security tab

jobs:
  analyze:
    name: Analyze Python Code
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Initialize CodeQL for Python
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      # Step 3: Install dependencies (optional but recommended)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Perform CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
